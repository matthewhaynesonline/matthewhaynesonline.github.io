<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}" data-bs-theme="auto">
  {% include html_head.html %}
  <body>
    {% include header.html %}

    <div class="container mt-4">
      <div class="row">
        <div class="col">
          <a class="mb-3 d-inline-block" href="/posts">❮ Posts</a>
          {% include title_date.html %}
        </div>
      </div>
    </div>

   <div class="container main-container">
      <div class="row page-layout">
        <div class="col-12 col-md-4 col-lg-3 mb-4">
          <div id="in-page-nav" data-svelte-component="InPageNav"></div>
        </div>

        <div class="col-12 col-md-8 col-lg-9" id="main-content">
        
          {{ content }}

          <div class="mb-3" data-svelte-component="BackToTop"></div>
          {% include page_prev_next.html %}
        </div>
      </div>
    </div>

    {% include footer.html %}
  </body>
</html>
