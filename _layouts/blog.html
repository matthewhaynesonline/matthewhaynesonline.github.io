<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}" data-bs-theme="auto">
  {% include html_head.html %}
  <body>
    {% include header.html %}

    <div class="container mt-5">
      <div class="row">
        <div class="col">
          {% include title_date.html %}
        </div>
      </div>
    </div>

   <div class="container main-container pt-5">
      <div class="row page-layout">
        {% include in_page_nav.html %}

        <div class="col col-md-8 col-lg-9" id="main-content">
        
          {{ content }}

          {% if page.previous %}
            <a href="{{ page.previous.url | relative_url }}">
              ← {{ page.previous.title }}
            </a>
          {% endif %}

          {% if page.next %}
            <a class="float-end" href="{{ page.next.url | relative_url }}">
              {{ page.next.title }} →
            </a>
          {% endif %}
        </div>
      </div>
    </div>

    {% include footer.html %}
  </body>
</html>
